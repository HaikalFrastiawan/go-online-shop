<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Produk Online Shop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { font-size: 24px; margin-top: 0; color: #111; text-align: center; }
        label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { margin-top: 25px; width: 100%; padding: 12px; background-color: #f59e0b; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: background-color 0.2s; }
        button:hover { background-color: #d97706; }
        #message { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; font-size: 14px; text-align: center; }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .image-preview { width: 100%; height: 200px; background-color: #f3f4f6; border-radius: 6px; margin-top: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; color: #9ca3af; font-size: 14px;}
        .image-preview img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tambah Produk Baru</h1>
        <form id="uploadForm">
            <label for="name">Nama Produk</label>
            <input type="text" id="name" name="name" required placeholder="Contoh: Baju Kaos Polos">

            <label for="price">Harga (Rp)</label>
            <input type="number" id="price" name="price" required placeholder="Contoh: 50000">

            <label for="image">Gambar Produk</label>
            <input type="file" id="image" name="image" accept="image/*" required onchange="previewImage(event)">
            
            <div class="image-preview" id="previewContainer">
                <span>Pratinjau Gambar</span>
                <img id="preview" alt="Preview Gambar" />
            </div>

            <button type="submit" id="submitBtn">Upload Produk</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        function previewImage(event) {
            const previewContainer = document.getElementById('previewContainer');
            const preview = document.getElementById('preview');
            const spanText = previewContainer.querySelector('span');
            const file = event.target.files[0];

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    spanText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('submitBtn');
            const msgBox = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'Mengupload...';
            msgBox.style.display = 'none';
            msgBox.className = '';

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('image', document.getElementById('image').files[0]);

            try {
                // Endpoint backend
                const response = await fetch('http://localhost:9000/products', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    msgBox.textContent = '✅ Produk berhasil ditambahkan!';
                    msgBox.classList.add('success');
                    msgBox.style.display = 'block';
                    form.reset();
                    document.getElementById('preview').style.display = 'none';
                    document.getElementById('previewContainer').querySelector('span').style.display = 'inline';
                } else {
                    const text = await response.text();
                    msgBox.textContent = '❌ Gagal: ' + text;
                    msgBox.classList.add('error');
                    msgBox.style.display = 'block';
                }
            } catch (error) {
                msgBox.textContent = '❌ Terjadi kesalahan koneksi. Pastikan backend server Go (localhost:9000) sedang menyala.';
                msgBox.classList.add('error');
                msgBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Upload Produk';
            }
        });
    </script>
</body>
</html>
